name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # ใช้ action ที่มีอยู่จริง
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          
      # แก้ install command ให้ไม่ frozen
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
        
      - name: Lint
        run: pnpm run lint
        
      - name: Type Check
        run: pnpm run typecheck
        
      - name: Test
        run: pnpm run test
